  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const mathElements = {
      'math-conv': '(f * g)(t) = \\int_{-\\infty}^{\\infty} f(\\tau) \\cdot g(t - \\tau) \\, d\\tau',
      'math-conv2d': '(I * K)(i, j) = \\sum_{m} \\sum_{n} I(i+m, j+n) \\cdot K(m, n)',
      'math-output-size': 'O = \\frac{W - K + 2P}{S} + 1',
      'math-std-conv': 'Y_{j} = \\sum_{i=1}^{C_{in}} X_i * K_{i,j} + b_j',
      'math-vgg-insight': '3 \\times 3 \\text{ conv (2 layers)} = 5 \\times 5 \\text{ receptive field, but } 2 \\times \\text{ReLU} + 18\\% \\text{ fewer params}',
      'math-residual': 'y = F(x, \\{W_i\\}) + x',
    };
    Object.entries(mathElements).forEach(([id, tex]) => {
      const el = document.getElementById(id);
      if (el) {
        try { katex.render(tex, el, { displayMode: true, throwOnError: false }); }
        catch(e) { el.textContent = tex; }
      }
    });
    renderMathInElement(document.body, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
      ]
    });
  });
  </script>
