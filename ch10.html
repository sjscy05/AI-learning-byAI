  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const mathElements = {
      'math-gan-loss': '\\min_G \\max_D \\; V(D, G) = \\mathbb{E}_{x \\sim p_{data}(x)}[\\log D(x)] + \\mathbb{E}_{z \\sim p_z(z)}[\\log(1 - D(G(z)))]',
      'math-yolo-bbox': 'b_x = \\sigma(t_x) + c_x, \\quad b_y = \\sigma(t_y) + c_y, \\quad b_w = p_w e^{t_w}, \\quad b_h = p_h e^{t_h}',
    };
    Object.entries(mathElements).forEach(([id, tex]) => {
      const el = document.getElementById(id);
      if (el) {
        try { katex.render(tex, el, { displayMode: true, throwOnError: false }); }
        catch(e) { el.textContent = tex; }
      }
    });
    renderMathInElement(document.body, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
      ]
    });
  });
  </script>
